# =============================================================================
# MyDistro — Branding & Identity Configuration
# =============================================================================
# Edit this file with your real values, then run:
#   ./scripts/apply-branding.sh
#
# That will substitute these values into all phase documents and build configs.
# =============================================================================

# Distro identity
DISTRO_NAME="ChaoticEvil"                   # Display name, e.g. "Acme OS"
DISTRO_ID="chaoticevil"                     # Lowercase, no spaces, e.g. "acmeos"
DISTRO_CODENAME="Jade Juiblex"              # Human-readable release codename (display only)
DISTRO_CODENAME_ID="jade-juiblex"           # Machine-readable codename — no spaces (used in lsb-release)
DISTRO_VERSION="1.0"                        # Initial version number
DISTRO_PRETTY_NAME="${DISTRO_NAME} ${DISTRO_VERSION}"

# URLs
DISTRO_URL="https://chaoticevil.thzero.com"
DISTRO_SUPPORT_URL="https://chaoticevil.thzero.com/support"
DISTRO_BUGS_URL="https://chaoticevil.thzero.com/issues"
DISTRO_NOTES_URL="https://chaoticevil.thzero.com/notes"
DISTRO_DONATE_URL=""

# Package repository (leave blank if not hosting your own .deb packages)
DISTRO_PKG_REPO_URL=""                       # Leave blank if not hosting your own .deb packages
                                            # Example: https://pkg.chaoticevil.thzero.com/apt

# GPG / signing
DISTRO_SIGNING_EMAIL="releases@thzero.com"
DISTRO_SIGNING_NAME="${DISTRO_NAME} Release"

# Ubuntu base
UBUNTU_CODENAME="noble"                     # noble=24.04, jammy=22.04

# Codename for lsb-release — must be a single word or hyphenated (no spaces)
DISTRO_CODENAME_ID="jade-juiblex"           # used in DISTRIB_CODENAME

# Theme / visual names (usually same as DISTRO_NAME / DISTRO_ID)
DISTRO_THEME_NAME="${DISTRO_NAME}"          # GTK theme name
DISTRO_ICON_THEME="${DISTRO_NAME}"          # Icon theme name
DISTRO_PLYMOUTH_THEME="${DISTRO_ID}"        # Plymouth theme name (lowercase)
DISTRO_CALAMARES_BRANDING="${DISTRO_ID}"    # Calamares branding component name

# Colors (used in GTK theme, Calamares sidebar, GRUB background, Plymouth)
# Values must be plain hex — no spaces or extra text
COLOR_BG_DARK="#0f0909"                     # Dried blood / obsidian black
COLOR_BG_MID="#1c0d0d"                      # Deep crimson shadow
COLOR_ACCENT="#b30000"                      # Fresh visceral red
COLOR_TEXT_PRIMARY="#d9c8a9"                # Ancient yellowed bone
COLOR_TEXT_SECONDARY="#6b5a45"             # Aged parchment / muted
COLOR_BUTTON_BG="#2a0a0a"                   # Dark crimson button background
COLOR_TEXT_SECONDAR="#6e5a5a (Flesh-tone grey)"
COLOR_BUTTON_BG="#450a0a (Coagulated red)"